name: Feed Status Check

on:
  schedule:
    - cron: "23 1 * * *"   # Runs at 01:23 UTC daily
  workflow_dispatch:        # Allow manual runs from the Actions tab

permissions:
  contents: write           # Needed to commit the updated CSV back

jobs:
  check-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run Feed Status Checker
        run: python Scripts/FeedStatusChecker.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ThreatIntelFeeds.csv
          git diff --cached --quiet || git commit -m "Latest FeedStatus Change [$(date -u '+%Y-%m-%d')]"
          git push